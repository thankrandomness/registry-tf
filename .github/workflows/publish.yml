name: Publish

on:
  push:
    branches: [main]
    paths: ['modules/**']
  workflow_dispatch:
    inputs:
      module_path:
        description: 'Module path (e.g., modules/aws/iam/role)'
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  authorize:
    name: Authorize
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.LACE_ORG_CI_APP_ID }}
          private-key: ${{ secrets.LACE_ORG_CI_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check platform-team membership
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          STATUS=$(gh api \
            "orgs/${{ github.repository_owner }}/teams/platform-team/memberships/${{ github.actor }}" \
            --jq '.state' 2>/dev/null || echo "not_found")

          if [ "$STATUS" != "active" ]; then
            echo "::error::@${{ github.actor }} is not a member of @${{ github.repository_owner }}/platform-team. Manual dispatch is restricted to platform team members."
            exit 1
          fi

          echo "Authorized: @${{ github.actor }} is an active platform-team member"

  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    needs: authorize
    if: always() && (needs.authorize.result == 'success' || needs.authorize.result == 'skipped')

    outputs:
      modules_json: ${{ steps.resolve.outputs.modules_json }}
      modules_found: ${{ steps.resolve.outputs.modules_found }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve modules
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODULE="${{ inputs.module_path }}"
            if [ ! -d "$MODULE" ]; then
              echo "::error::Directory not found: $MODULE"
              exit 1
            fi
            if [ ! -f "$MODULE/module.yaml" ]; then
              echo "::error::module.yaml missing in $MODULE"
              exit 1
            fi
            echo "Manual trigger: $MODULE"
            echo "modules_json=[\"$MODULE\"]" >> $GITHUB_OUTPUT
            echo "modules_found=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Push event — detect changed modules
          changed=$(git diff --name-only --diff-filter=AM HEAD^ HEAD | grep '^modules/' || true)
          if [ -z "$changed" ]; then
            echo "No module changes detected"
            echo "modules_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "$changed"

          find_module_root() {
            local dir=$(dirname "$1")
            while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
              [ -f "$dir/module.yaml" ] && echo "$dir" && return 0
              [ "$dir" = "modules" ] && return 1
              dir=$(dirname "$dir")
            done
            return 1
          }

          dirs=""
          for file in $changed; do
            root=$(find_module_root "$file") && dirs="$dirs$root"$'\n'
          done

          unique=$(echo "$dirs" | sort -u | sed '/^$/d')
          if [ -z "$unique" ]; then
            echo "No valid modules found"
            echo "modules_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Modules to publish:"
          echo "$unique"

          modules_json=$(echo "$unique" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules_json=$modules_json" >> $GITHUB_OUTPUT
          echo "modules_found=true" >> $GITHUB_OUTPUT

  register:
    name: Register
    runs-on: ubuntu-latest
    needs: prepare
    if: always() && needs.prepare.result == 'success' && needs.prepare.outputs.modules_found == 'true'

    strategy:
      matrix:
        module_path: ${{ fromJson(needs.prepare.outputs.modules_json) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Validate structure
        run: |
          MODULE="${{ matrix.module_path }}"
          [ -d "$MODULE" ]             || { echo "::error::Directory not found: $MODULE"; exit 1; }
          [ -f "$MODULE/module.yaml" ] || { echo "::error::module.yaml missing"; exit 1; }
          [ -f "$MODULE/main.tf" ]     || { echo "::error::main.tf missing"; exit 1; }

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Install Lace CLI
        run: |
          wget -q https://releases.lace.cloud/lace-cli-linux-amd64 -O lace
          chmod +x lace && sudo mv lace /usr/local/bin/lace

      - name: Authenticate
        env:
          LACE_REGISTRY_KEY: ${{ secrets.LACE_REGISTRY_KEY }}
        run: |
          [ -z "$LACE_REGISTRY_KEY" ] && { echo "::error::LACE_REGISTRY_KEY secret not set"; exit 1; }
          lace whoami

      - name: Register module
        env:
          LACE_REGISTRY_KEY: ${{ secrets.LACE_REGISTRY_KEY }}
          LACE_ORGANIZATION: ${{ vars.LACE_ORGANIZATION }}
        run: |
          ORG_FLAG=""
          [ -n "$LACE_ORGANIZATION" ] && ORG_FLAG="--organization $LACE_ORGANIZATION"
          lace terraform-registry register \
            --module-path "${{ matrix.module_path }}" \
            --commit-sha "${{ github.sha }}" \
            --ref "${{ github.ref }}" \
            --actor "${{ github.actor }}" \
            $ORG_FLAG

      - name: Verify registration
        env:
          LACE_REGISTRY_KEY: ${{ secrets.LACE_REGISTRY_KEY }}
          LACE_ORGANIZATION: ${{ vars.LACE_ORGANIZATION }}
        run: |
          MODULE="${{ matrix.module_path }}"
          NAME=$(grep "^  name:" "$MODULE/module.yaml" | head -1 | sed 's/^[^:]*: *//' | tr -d '"')
          SYSTEM=$(grep "^  system:" "$MODULE/module.yaml" | head -1 | sed 's/^[^:]*: *//' | tr -d '"')
          echo "Verifying: $SYSTEM/$NAME"
          ORG_FLAG=""
          [ -n "$LACE_ORGANIZATION" ] && ORG_FLAG="--organization $LACE_ORGANIZATION"
          lace terraform-registry get "$NAME" "$SYSTEM" $ORG_FLAG

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [prepare, register]
    if: always()

    steps:
      - name: Report
        run: |
          echo "# Module Registration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.prepare.outputs.modules_found }}" != "true" ]; then
            echo "No module changes detected." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## Modules" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.prepare.outputs.modules_json }}' | jq -r '.[] | "- `" + . + "`"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.register.result }}" = "success" ]; then
            echo "**Result:** All modules registered successfully." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.register.result }}" = "failure" ]; then
            echo "**Result:** Registration failed." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Result:** ${{ needs.register.result }}" >> $GITHUB_STEP_SUMMARY
          fi
